# Model arguments
model_name_or_path: princeton-nlp/Llama-3-Base-8B-SFT
torch_dtype: null
attn_implementation: flash_attention_2

# Data training arguments
dataset_mixer:
  HuggingFaceH4/ultrafeedback_binarized: 0.1
dataset_splits:
  - train_prefs
  - test_prefs
preprocessing_num_workers: 2
dataset_num_proc: 2
use_persistent_hf_cache: false
hf_cache_dir: null

# Beta-DPO smoke arguments
bf16: true
beta: 0.1
rho: 0.8
alpha: 0.6
ema_momentum: 0.9
beta_min: 1.0e-3
sync_global_mask: true
deterministic_eval: false
require_equal_local_batch_size: true
do_eval: false
gradient_accumulation_steps: 1
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 1.0e-6
log_level: info
logging_steps: 1
lr_scheduler_type: linear
max_length: 2048
max_prompt_length: 1792
tokenization_mode: online
tokenization_batch_size: 64
reuse_tokenized_dataset: false
tokenized_dataset_cache_dir: null
max_steps: 20
optim: rmsprop
output_dir: outputs/llama-3-8b-base-beta-dpo-smoke
run_name: llama-3-8b-base-beta-dpo-smoke
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
push_to_hub: false
save_strategy: "no"
seed: 42
warmup_ratio: 0.0
