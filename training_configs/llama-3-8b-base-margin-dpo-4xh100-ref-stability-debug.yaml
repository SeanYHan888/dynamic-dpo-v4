# Model arguments
model_name_or_path: princeton-nlp/Llama-3-Base-8B-SFT
torch_dtype: null
attn_implementation: sdpa

# Data training arguments
dataset_mixer:
  HuggingFaceH4/ultrafeedback_binarized: 0.1
dataset_splits:
  - train_prefs
dataset_configs:
  - default
preprocessing_num_workers: 8
dataset_num_proc: 8
use_persistent_hf_cache: true
hf_cache_dir: null

# Margin-DPO reference stability debug arguments
bf16: true
beta: 0.01
require_explicit_ref_model: true
f_divergence_type: reverse_kl
f_alpha_divergence_coef: 1.0
margin_log_path: outputs/llama-3-8b-base-margin-dpo-4xh100-ref-stability-debug/margin_logs
margin_log_steps: 1
margin_save_full: false
non_finite_logits_handling: error
precompute_ref_log_probs: true
precompute_ref_batch_size: 1
precompute_ref_eval_batch_size: 1

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
dataloader_drop_last: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

learning_rate: 5.0e-7
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_steps: 10
max_length: 1024
max_prompt_length: 512
optim: adamw_torch

tokenization_mode: online
tokenization_batch_size: 64
reuse_tokenized_dataset: true
tokenized_dataset_cache_dir: .cache/tokenized_preferences

do_eval: false
eval_strategy: "no"
logging_steps: 1
log_level: info

output_dir: outputs/llama-3-8b-base-margin-dpo-4xh100-ref-stability-debug
run_name: llama-3-8b-base-margin-dpo-4xh100-ref-stability-debug
save_strategy: "no"
save_total_limit: 1
report_to: []
seed: 42
push_to_hub: false
