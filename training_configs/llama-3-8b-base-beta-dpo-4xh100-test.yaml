# Model arguments
model_name_or_path: princeton-nlp/Llama-3-Base-8B-SFT
torch_dtype: null
attn_implementation: flash_attention_2

# Data training arguments
dataset_mixer:
  HuggingFaceH4/ultrafeedback_binarized: 0.1
dataset_splits:
  - train_prefs
  - test_prefs
preprocessing_num_workers: 4
dataset_num_proc: 4
use_persistent_hf_cache: true
hf_cache_dir: null

# Beta-DPO test arguments
bf16: true
beta: 0.1
rho: 0.8
alpha: 0.6
ema_momentum: 0.9
beta_min: 1.0e-3
sync_global_mask: true
deterministic_eval: true
require_equal_local_batch_size: true

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 1
dataloader_drop_last: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

learning_rate: 5.0e-7
warmup_ratio: 0.05
lr_scheduler_type: linear
optim: rmsprop

max_length: 2048
max_prompt_length: 1792
reuse_tokenized_dataset: true
tokenized_dataset_cache_dir: null

do_eval: false
evaluation_strategy: "no"
logging_steps: 1
log_level: info
max_steps: 50

output_dir: outputs/llama-3-8b-base-beta-dpo-4xh100-test
run_name: llama-3-8b-base-beta-dpo-4xh100-test
push_to_hub: false
save_strategy: "no"
report_to:
  - wandb
seed: 42
