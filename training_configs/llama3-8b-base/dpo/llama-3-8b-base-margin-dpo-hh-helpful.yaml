# Model arguments
model_name_or_path: W-61/llama-3-8b-base-sft-hh-helpful-4xh200
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data arguments
dataset_mixer:
  Anthropic/hh-rlhf: 1.0
dataset_configs:
  - helpful-base
dataset_splits:
  - train
  - test
preprocessing_num_workers: 12
dataset_num_proc: 12
use_persistent_hf_cache: true
hf_cache_dir: null

# Training arguments
bf16: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# DPO arguments
f_divergence_type: reverse_kl
f_alpha_divergence_coef: 1.0
beta: 0.1
require_explicit_ref_model: true
precompute_ref_log_probs: false
non_finite_logits_handling: error

# Margin logging
margin_log_path: outputs/llama-3-8b-base-margin-dpo-hh-helpful/margin_logs
margin_log_steps: 1
margin_save_full: true

# Batch and sequence arguments
per_device_train_batch_size: 16
per_device_eval_batch_size: 16
gradient_accumulation_steps: 1
dataloader_drop_last: true
max_length: 512
max_prompt_length: 256

# Optimization arguments
optim: adamw_torch
learning_rate: 5.0e-7
lr_scheduler_type: cosine
warmup_ratio: 0.1
num_train_epochs: 1

# Tokenization arguments
tokenization_mode: online
tokenization_batch_size: 128
reuse_tokenized_dataset: true
tokenized_dataset_cache_dir: .cache/tokenized_preferences

# Evaluation and logging
logging_steps: 5
log_level: info
do_eval: true
eval_strategy: steps
eval_steps: 100

# Output and checkpointing
seed: 42
output_dir: outputs/llama-3-8b-base-margin-dpo-hh-helpful
run_name: llama-3-8b-base-margin-dpo-hh-helpful
save_strategy: "no"
save_steps: 50
save_total_limit: 2

# Hub and reporting
report_to:
  - wandb
push_to_hub: false
hub_model_id: jackf857/llama-3-8b-base-margin-dpo-hh-helpful
push_margin_dataset: false
hub_margin_dataset_id: jackf857/llama-3-8b-base-margin-dpo-hh-helpful-margin-log
margin_dataset_split: train
