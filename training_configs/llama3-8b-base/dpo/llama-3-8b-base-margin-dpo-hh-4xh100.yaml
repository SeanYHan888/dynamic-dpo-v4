# Model arguments
model_name_or_path: W-61/llama-3-8b-base-hh-harmless-sft-4xh100
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_mixer:
  Anthropic/hh-rlhf: 1.0
dataset_configs:
  - harmless-base
dataset_splits:
  - train
  - test
preprocessing_num_workers: 8
dataset_num_proc: 8
use_persistent_hf_cache: true
hf_cache_dir: null

# Margin-DPO trainer arguments
bf16: true
beta: 0.01
require_explicit_ref_model: true
f_divergence_type: reverse_kl
f_alpha_divergence_coef: 1.0
margin_log_path: /workspace/outputs/llama-3-8b-base-margin-dpo-hh-4xh100/margin_logs
margin_log_steps: 5
margin_save_full: false
non_finite_logits_handling: error
precompute_ref_log_probs: false

per_device_train_batch_size: 8
per_device_eval_batch_size: 8
gradient_accumulation_steps: 4
dataloader_drop_last: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

learning_rate: 5.0e-7
lr_scheduler_type: cosine
warmup_ratio: 0.1
num_train_epochs: 1
max_length: 1024
max_prompt_length: 512
optim: adamw_torch

tokenization_mode: online
tokenization_batch_size: 64
reuse_tokenized_dataset: true
tokenized_dataset_cache_dir: .cache/tokenized_preferences

do_eval: false
eval_strategy: "no"
logging_steps: 5
log_level: info

output_dir: outputs/llama-3-8b-base-margin-dpo-hh-4xh100
run_name: llama-3-8b-base-margin-dpo-hh-4xh100
save_strategy: "no"
save_steps: 50
save_total_limit: 2
report_to:
  - wandb
seed: 42
push_to_hub: true
hub_model_id: jackf857/llama-3-8b-base-margin-dpo-hh-4xh100
push_margin_dataset: true
hub_margin_dataset_id: jackf857/llama-3-8b-base-margin-dpo-hh-4xh100-margin-log
margin_dataset_split: train
