# Model arguments
model_name_or_path: meta-llama/Meta-Llama-3-8B
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data arguments
chat_template: "{% set loop_messages = messages %}{% for message in loop_messages %}{% set content = '<|start_header_id|>' + message['role'] + '<|end_header_id|>\n\n'+ message['content'] | trim + '<|eot_id|>' %}{% if loop.index0 == 0 %}{% set content = bos_token + content %}{% endif %}{{ content }}{% endfor %}{% if add_generation_prompt %}{{ '<|start_header_id|>assistant<|end_header_id|>\n\n' }}{% endif %}"
dataset_mixer:
  Anthropic/hh-rlhf: 1.0
dataset_splits:
  - train
  - test
dataset_dir: helpful-base
preprocessing_num_workers: 12

# Training arguments
bf16: true
per_device_train_batch_size: 16
per_device_eval_batch_size: 16
gradient_accumulation_steps: 1
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 2.0e-05
lr_scheduler_type: cosine
warmup_ratio: 0.1
num_train_epochs: 1
max_steps: -1
seed: 42
max_seq_length: 512
remove_unused_columns: true

# Evaluation and logging
do_eval: true
evaluation_strategy: steps
eval_steps: 100
log_level: info
logging_steps: 5
logging_strategy: steps

# Output and checkpointing
output_dir: outputs/llama-3-8b-base-sft-hh-helpful-4xh200
run_name: llama-3-8b-base-sft-hh-helpful-4xh200
overwrite_output_dir: true
save_strategy: "no"
save_steps: 1000000
save_total_limit: 1

# Hub and reporting
push_to_hub: false
hub_model_id: W-61/llama-3-8b-base-sft-hh-helpful-4xh200
hub_strategy: end
report_to:
  - wandb
