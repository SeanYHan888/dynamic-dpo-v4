# Model arguments
model_name_or_path: W-61/llama-3-8b-base-hh-harmless-sft-4xh100
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data training arguments
dataset_mixer:
  Anthropic/hh-rlhf: 1.0
dataset_configs:
  - harmless-base
dataset_splits:
  - train
  - test
preprocessing_num_workers: 8
dataset_num_proc: 8
use_persistent_hf_cache: true
hf_cache_dir: null

# Beta-DPO trainer arguments
bf16: true
beta: 0.1
rho: 0.8
alpha: 0.6
ema_momentum: 0.9
beta_min: 1.0e-3
sync_global_mask: true
deterministic_eval: false
require_equal_local_batch_size: true
precompute_ref_log_probs: true

per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 8
dataloader_drop_last: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

learning_rate: 5.0e-7
warmup_ratio: 0.05
lr_scheduler_type: linear
optim: rmsprop

max_length: 512
max_prompt_length: 256
tokenization_mode: online
tokenization_batch_size: 64
reuse_tokenized_dataset: true
tokenized_dataset_cache_dir: .cache/tokenized_preferences

do_eval: false
evaluation_strategy: "no"
logging_steps: 5
log_level: info
num_train_epochs: 1

output_dir: outputs/llama-3-8b-base-beta-dpo-hh-4xh100
run_name: llama-3-8b-base-beta-dpo-hh-4xh100
push_to_hub: false
save_strategy: "no"
save_total_limit: 2
report_to:
  - wandb
seed: 42
