# Model arguments
model_name_or_path: W-61/llama-3-8b-base-sft-ultrachat-4xh200
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data arguments
dataset_mixer:
  HuggingFaceH4/ultrafeedback_binarized: 1.0
dataset_configs:
  - default
dataset_splits:
  - train_prefs
  - test_prefs
preprocessing_num_workers: 12
dataset_num_proc: 12
use_persistent_hf_cache: true
hf_cache_dir: null

# Training arguments
bf16: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
precompute_ref_log_probs: false

# Beta-DPO arguments
beta: 0.1
rho: 0.8
alpha: 0.6
ema_momentum: 0.9
beta_min: 1.0e-3
sync_global_mask: true
deterministic_eval: true
require_equal_local_batch_size: true

# Batch and sequence arguments
per_device_train_batch_size: 8
per_device_eval_batch_size: 8
gradient_accumulation_steps: 2
dataloader_drop_last: true
max_length: 2048
max_prompt_length: 1800

# Optimization arguments
optim: adamw_torch
learning_rate: 5.0e-7
lr_scheduler_type: cosine
warmup_ratio: 0.1
num_train_epochs: 1

# Tokenization arguments
truncation_mode: keep_start
tokenization_mode: online
tokenization_batch_size: 128
reuse_tokenized_dataset: true
tokenized_dataset_cache_dir: .cache/tokenized_preferences

# Evaluation and logging
do_eval: true
eval_strategy: steps
eval_steps: 200
logging_steps: 10
log_level: info

# Output and checkpointing
seed: 42
output_dir: outputs/llama-3-8b-base-beta-dpo-ultrafeedback-4xh200
run_name: llama-3-8b-base-beta-dpo-ultrafeedback-4xh200
save_strategy: "no"
save_steps: 50
save_total_limit: 2

# Hub and reporting
report_to:
  - wandb
push_to_hub: false
hub_model_id: W-61/llama-3-8b-base-beta-dpo-ultrafeedback-4xh200
