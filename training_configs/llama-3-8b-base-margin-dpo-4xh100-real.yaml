# Model arguments
model_name_or_path: princeton-nlp/Llama-3-Base-8B-SFT
torch_dtype: null
attn_implementation: flash_attention_2

# Data training arguments
dataset_mixer:
  HuggingFaceH4/ultrafeedback_binarized: 1.0
dataset_splits:
  - train_prefs
  - test_prefs
dataset_configs:
  - default
preprocessing_num_workers: 8
dataset_num_proc: 8
use_persistent_hf_cache: true
hf_cache_dir: null

# Margin-DPO trainer arguments
bf16: true
beta: 0.01
require_explicit_ref_model: true
f_divergence_type: reverse_kl
f_alpha_divergence_coef: 1.0
margin_log_path: outputs/llama-3-8b-base-margin-dpo-4xh100-real/margin_logs
margin_log_steps: 10
margin_save_full: false
non_finite_logits_handling: error
precompute_ref_log_probs: true
precompute_ref_batch_size: 1
precompute_ref_eval_batch_size: 1

per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 16
dataloader_drop_last: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

learning_rate: 5.0e-7
lr_scheduler_type: cosine
warmup_ratio: 0.05
num_train_epochs: 1
max_length: 2048
max_prompt_length: 1792
optim: adamw_torch

tokenization_mode: online
tokenization_batch_size: 64
reuse_tokenized_dataset: true
tokenized_dataset_cache_dir: .cache/tokenized_preferences

do_eval: true
eval_strategy: "no"
logging_steps: 10
log_level: info

output_dir: outputs/llama-3-8b-base-margin-dpo-4xh100-real
run_name: llama-3-8b-base-margin-dpo-4xh100-real
save_strategy: steps
save_steps: 250
save_total_limit: 3
report_to:
  - wandb
seed: 42
push_to_hub: false
hub_model_id: llama-3-8b-base-margin-dpo-4xh100-real
