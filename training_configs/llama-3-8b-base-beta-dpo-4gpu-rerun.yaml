# Model arguments
model_name_or_path: princeton-nlp/Llama-3-Base-8B-SFT
torch_dtype: null
attn_implementation: sdpa

# Data training arguments
dataset_mixer:
  HuggingFaceH4/ultrafeedback_binarized: 1.0
dataset_splits:
  - train_prefs
preprocessing_num_workers: 12
dataset_num_proc: 12
use_persistent_hf_cache: true
hf_cache_dir: null

# Beta-DPO 4-GPU rerun arguments
bf16: true
beta: 0.1
rho: 1.0
alpha: 0.01
ema_momentum: 0.9
beta_min: 1.0e-3
sync_global_mask: true
deterministic_eval: false
require_equal_local_batch_size: true
precompute_ref_log_probs: true

per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 16
dataloader_drop_last: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

learning_rate: 5.0e-7
warmup_ratio: 0.05
lr_scheduler_type: linear
optim: rmsprop

max_length: 2048
max_prompt_length: 1792
tokenization_mode: online
tokenization_batch_size: 64
reuse_tokenized_dataset: true
tokenized_dataset_cache_dir: null

do_eval: false
evaluation_strategy: "no"
logging_steps: 10
log_level: info
num_train_epochs: 1

output_dir: outputs/llama-3-8b-base-beta-dpo-4gpu-rerun
run_name: llama-3-8b-base-beta-dpo-4gpu-rerun
hub_model_id: W-61/llama-3-8b-base-beta-dpo-4gpu-rerun
push_to_hub: false
save_strategy: steps
save_steps: 100
save_total_limit: 3
report_to:
  - wandb
seed: 42
