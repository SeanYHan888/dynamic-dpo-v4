# Model arguments
model_name_or_path: princeton-nlp/Llama-3-Base-8B-SFT
torch_dtype: null
attn_implementation: flash_attention_2

# Data training arguments
dataset_mixer:
  HuggingFaceH4/ultrafeedback_binarized: 1.0
dataset_splits:
  - train_prefs
  - test_prefs
preprocessing_num_workers: 12
dataset_num_proc: 12

# Margin-DPO trainer arguments
bf16: true
beta: 0.1
do_eval: true
evaluation_strategy: steps
eval_steps: 200
gradient_accumulation_steps: 8
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: margin-dpo-exps
learning_rate: 1.0e-6
log_level: info
logging_steps: 10
lr_scheduler_type: linear
max_length: 2048
max_prompt_length: 1792
num_train_epochs: 1
optim: rmsprop
output_dir: outputs/llama-3-8b-base-margin-dpo
run_name: llama-3-8b-base-margin-dpo
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
push_to_hub: false
save_strategy: steps
save_steps: 1000000
report_to:
  - wandb
save_total_limit: 20
seed: 42
warmup_ratio: 0.1
margin_log_path: outputs/llama-3-8b-base-margin-dpo/margin_logs
margin_log_steps: 50
margin_save_full: false
require_explicit_ref_model: true
f_divergence_type: reverse_kl
f_alpha_divergence_coef: 1.0
