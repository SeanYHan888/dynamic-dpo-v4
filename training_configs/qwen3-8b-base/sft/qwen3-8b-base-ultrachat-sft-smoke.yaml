# Model arguments
model_name_or_path: Qwen/Qwen3-8B-Base
model_revision: main
torch_dtype: null
attn_implementation: sdpa

# Data arguments
dataset_mixer:
  HuggingFaceH4/ultrachat_200k: 1.0
dataset_splits:
  - train_sft
  - test_sft
preprocessing_num_workers: 2

# Training arguments
bf16: true
gradient_accumulation_steps: 1
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 1.0e-6
lr_scheduler_type: linear
warmup_ratio: 0.0
num_train_epochs: 1
max_steps: 20
seed: 42
max_seq_length: 2048
per_device_train_batch_size: 1
per_device_eval_batch_size: 1

# Evaluation and logging
do_eval: false
log_level: info
logging_steps: 1
logging_strategy: steps

# Output and checkpointing
output_dir: outputs/qwen3-8b-base-ultrachat-sft-smoke
run_name: qwen3-8b-base-ultrachat-sft-smoke
overwrite_output_dir: true
save_strategy: "no"

# Hub and reporting
push_to_hub: false
report_to:
  - wandb
