# Model arguments
model_name_or_path: Qwen/Qwen3-8B-Base
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Data arguments
dataset_mixer:
  HuggingFaceH4/ultrachat_200k: 1.0
dataset_splits:
  - train_sft
  - test_sft
preprocessing_num_workers: 8

# Training arguments
bf16: true
gradient_accumulation_steps: 16
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 2.0e-05
lr_scheduler_type: cosine
warmup_ratio: 0.1
num_train_epochs: 1
max_steps: -1
seed: 42
max_seq_length: 2048
per_device_train_batch_size: 2
per_device_eval_batch_size: 2

# Evaluation and logging
do_eval: true
eval_strategy: steps
eval_steps: 200
log_level: info
logging_steps: 5
logging_strategy: steps

# Output and checkpointing
output_dir: outputs/qwen3-8b-base-ultrachat-sft-4xh100
run_name: qwen3-8b-base-ultrachat-sft-4xh100
overwrite_output_dir: true
save_strategy: "no"

# Hub and reporting
push_to_hub: false
hub_model_id: qwen3-8b-base-ultrachat-sft-4xh100
report_to:
  - wandb
