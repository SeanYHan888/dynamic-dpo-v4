# Model arguments
model_name_or_path: princeton-nlp/Llama-3-Base-8B-SFT
torch_dtype: null
attn_implementation: flash_attention_2

# Data training arguments
dataset_mixer:
  HuggingFaceH4/ultrafeedback_binarized: 0.1
dataset_splits:
  - train_prefs
preprocessing_num_workers: 8
dataset_num_proc: 8
use_persistent_hf_cache: true
hf_cache_dir: null

# Margin-DPO test arguments
bf16: true
beta: 0.1
require_explicit_ref_model: true
f_divergence_type: reverse_kl
f_alpha_divergence_coef: 1.0
margin_log_path: outputs/llama-3-8b-base-margin-dpo-4xh100-test/margin_logs
margin_log_steps: 1
margin_save_full: false
precompute_ref_log_probs: false

per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 8
dataloader_drop_last: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

learning_rate: 5.0e-7
warmup_ratio: 0.05
lr_scheduler_type: linear
optim: rmsprop

max_length: 2048
max_prompt_length: 1792
tokenization_mode: online
tokenization_batch_size: 128
reuse_tokenized_dataset: true
tokenized_dataset_cache_dir: null

do_eval: false
evaluation_strategy: "no"
logging_steps: 1
log_level: info
max_steps: 50

output_dir: outputs/llama-3-8b-base-margin-dpo-2xh100
run_name: llama-3-8b-base-margin-dpo-2xh100
push_to_hub: true
save_strategy: steps
save_steps: 25
save_total_limit: 5
report_to: []
seed: 42
